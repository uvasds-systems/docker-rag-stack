apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-data
  namespace: uvasds-services
spec:
  storageClassName: default
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
  namespace: uvasds-services
  labels:
    app: chromadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chromadb
  template:
    metadata:
      labels:
        app: chromadb
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:0.5.23
          ports:
            - containerPort: 8000
          env:
            - name: ANONYMIZED_TELEMETRY
              value: "false"
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: chroma-data
---
apiVersion: v1
kind: Service
metadata:
  name: chromadb
  namespace: uvasds-services
spec:
  selector:
    app: chromadb
  ports:
    - port: 8000
      targetPort: 8000
